</head>
<body>

    <h4>Cart Quantity</h4>
    <button 
    
    onclick="console.log('Cart quantity :' + Cartquantity)"
    
    >
       Show Quantity 
    </button>

   
    <button 
    
    onclick="Cartquantity = Cartquantity + 1; console.log('Cart Quantity :' + Cartquantity)">

        Add to cart
    </button>

  
  
    <button 
onclick="Cartquantity = Cartquantity + 2; console.log('Cart Quantity: ' + Cartquantity)">
    +2
</button>



<button onclick="Cartquantity = 0; console.log('Reset Cart');  console.log( 'Cart Quantity:' + Cartquantity)">
    Reset Cart
</button>


<button onclick="
Cartquantity = Cartquantity +=4
console.log(Cartquantity)">
+4</button>


<button onclick="Cartquantity = Cartquantity + 5; console.log('Cart Quantity: ' + Cartquantity)">

+5</button>


<button onclick="Cartquantity = Cartquantity += -1; console.log ('Cart Quantity :' + Cartquantity)" >
 Remove from cart
</button>



<button onclick="Cartquantity = Cartquantity += -2 ; console.log('Cart Quantity :' + Cartquantity)">

-2 </button>

-3 </button>
